<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Claude Access: An RFP Systems Perspective</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0f0f0e; }
    ::-webkit-scrollbar { width: 4px; height: 4px; }
    ::-webkit-scrollbar-track { background: #1a1a18; }
    ::-webkit-scrollbar-thumb { background: #3a3a38; border-radius: 2px; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState } = React;

    const architecture = [
      {
        layer: "00",
        label: "Foundation",
        description: "Organizational memory that every skill draws from as a shared knowledge base.",
        color: "#4a6741",
        skills: [
          { name: "Brand Voice & Tone Standards", note: "Enforces consistent language, register, and style across all outputs" },
          { name: "Boilerplate Library", note: "Org overview, team profiles, standard capability statements" },
          { name: "Compliance & Requirements Rules", note: "Mandatory language, certifications, regulatory constraints" },
        ]
      },
      {
        layer: "01",
        label: "Intelligence",
        description: "Intake and analysis skills that read an opportunity before the team writes a word.",
        color: "#7a6f62",
        skills: [
          { name: "RFP Parser", note: "Extracts requirements, deadlines, scoring weights, and evaluation criteria" },
          { name: "Win Theme Architect", note: "Builds the strategic narrative around why us, for this client, at this moment" },
          { name: "Competitive Context Skill", note: "Frames our differentiators against likely alternatives in the field" },
        ]
      },
      {
        layer: "02",
        label: "Drafting",
        description: "Section-level writing skills, purpose-built for each part of the proposal.",
        color: "#c9a96e",
        skills: [
          { name: "Executive Summary Writer", note: "Leads with the win theme and targets the decision-maker rather than the evaluator" },
          { name: "Technical / Programmatic Responder", note: "Maps our approach directly to stated requirements, requirement by requirement" },
          { name: "Team & Qualifications Skill", note: "Pulls from the boilerplate library and contextualizes credentials for each opportunity" },
          { name: "Pricing Narrative Skill", note: "Frames cost in terms of value, not line items" },
        ]
      },
      {
        layer: "03",
        label: "Quality",
        description: "Review and assurance skills that catch issues before anything goes out the door.",
        color: "#8a7fa0",
        skills: [
          { name: "Compliance Checker", note: "Verifies every stated requirement has a corresponding response" },
          { name: "Voice Consistency Reviewer", note: "Flags tonal drift, inconsistent terminology, and style violations" },
          { name: "Evaluator Simulation", note: "Scores our response the way the client panel would and surfaces gaps before submission" },
        ]
      },
      {
        layer: "04",
        label: "Output",
        description: "Delivery and learning skills that close the loop on every submission.",
        color: "#5a7a8a",
        skills: [
          { name: "Final Assembly Skill", note: "Compiles sections with consistent formatting and document structure" },
          { name: "Client-Facing Leave-Behind", note: "Generates a concise summary version for post-submission follow-up" },
          { name: "Win / Loss Debrief Skill", note: "Captures lessons learned and feeds them back into the Foundation layer" },
        ]
      },
    ];

    const roiItems = [
      { area: "Time per Proposal", current: "Manual research, drafting, and compliance review spread across multiple tools", withAccess: "Structured skills handle intake parsing, section drafting, and compliance checking in sequence", gain: "Meaningful reduction in hours per submission cycle", color: "#4a6741" },
      { area: "Output Consistency", current: "Voice, terminology, and formatting vary based on who drafted each section", withAccess: "Foundation layer enforces voice and standards across every output automatically", gain: "Uniform quality regardless of who initiates a draft", color: "#c9a96e" },
      { area: "Rework and Review", current: "Reviewers spend significant time correcting tone, terminology, and missed requirements", withAccess: "Quality layer catches compliance gaps and voice drift before human review begins", gain: "Reviewers focus on judgment calls rather than corrections", color: "#8a7fa0" },
      { area: "Tool Sprawl", current: "Multiple disconnected tools generate inconsistent outputs with no shared memory", withAccess: "A single governed ecosystem replaces the patchwork of individual workarounds", gain: "Reduced licensing risk and a clear governance model for AI use", color: "#5a7a8a" },
      { area: "Compounding Value", current: "Each proposal starts from scratch with no institutional learning carried forward", withAccess: "Win/loss insights feed back into Foundation skills, improving outputs over time", gain: "The toolkit gets smarter with every submission cycle", color: "#7a6f62" },
    ];

    const jdResponsibilities = [
      "Design, build, and maintain RFP systems, workflows, and tooling that improve drafting speed, consistency, and cross-functional coordination",
      "Develop and manage AI-supported tools and processes that assist with proposal assembly, content retrieval, reporting, and insight generation while maintaining high standards for clarity, accuracy, and Spring Health voice",
      "Establish standards, frameworks, and QC mechanisms that reduce risk and improve proposal quality at scale",
      "Enable team adoption of systems by documenting best practices and supporting consistent execution during peak volume",
    ];

    const jdSuccess = [
      "Reduced drafting and assembly time due to improved systems and workflows",
      "Increased consistency, accuracy, and clarity across proposal responses",
      "Strong adoption of proposal systems across the team",
      "Reduced error rate of issues that should have been caught during QA/QC",
    ];

    const execSummary = [
      { id: "opening", label: "Background", text: "My current role sits outside the pilot criteria, but the scope of my responsibilities positions me to contribute directly to how Claude gets adopted and configured across the organization." },
      { id: "credentials", label: "Power User Experience", text: "Building on Claude's DTC offering has produced my working understanding of what the enterprise instance will and will not support, and that perspective is directly relevant to getting the configuration right." },
      { id: "whyclaude", label: "Three Risks", text: "Early involvement gives us the opportunity to get ahead of writing inconsistency, agent sprawl, and integration decisions before they become harder to address." },
      { id: "theplan", label: "The Plan", text: "Inclusion in the pilot will lead to four infrastructure builds that shape how effectively Claude works for this team from day one." },
      { id: "jobdesc", label: "Job Alignment", text: "The Systems and Intelligence Specialization scope of this role maps directly to what the pilot is designed to produce, making this a natural fit rather than an exception." },
      { id: "formalask", label: "The Ask", text: "I am requesting early access with four specific commitments attached, structured to generate output that benefits the team and informs the broader rollout." },
    ];

    const sections = [
      { id: "execsummary", label: "Overview", icon: "◉", title: "Claude Access: An RFP Systems Perspective", subtitle: "Executive Summary", type: "execsummary" },
      { id: "opening", label: "Background", icon: "◈", title: "Claude Access: An RFP Systems Perspective", subtitle: "Background", body: `My current role restricts me from this phase of the Claude rollout, scoped for people managers and leaders. That is a reasonable starting point for a pilot, but it imposes potential risks for our team.\n\nMy new job description holds me accountable for building the AI-supported systems and workflows the proposal team depends on. Without access, I cannot execute on those responsibilities, and the team absorbs the delay.\n\nThe larger risk is one of sequencing. Our team works across nearly every function in the organization, which puts us in a position to meaningfully shape how Claude gets configured and used at a broader level. If access is granted after general rollout rather than before it, that window to identify gaps and shape the configuration closes. Other functions will establish the defaults, and we will spend time retrofitting our workflows as a result.\n\nEarly access is not about my productivity. It is about getting an alternative perspective from a power user who uses Claude in materially different ways than the power users currently in the pilot.` },
      { id: "credentials", label: "Power User Experience", icon: "◆", title: "Proposal Manager + Claude Power User", subtitle: "Threading together disparate tools, teams, and workflows to drive quality at scale", body: `Cowork will expand what the team can get done, and I see real value in that. However, I am trying to understand what is possible with the enterprise offering vs. what can be spun up in the DTC offering. My goal is to map what is possible inside the enterprise instance, help shape the configuration before it gets locked in, and establish guardrails that give the team a consistent foundation without limiting how Claude gets used across different workflows.\n\nOn my personal account, I have transformed manual tasks by converting prompts into reusable Skills.md frameworks that bring multi-step processes down from close to an hour to minutes. This has allowed me to eliminate my reliance on other LLMs like ChatGPT and replace personal software tools like Adobe entirely, consolidating my workflow within Claude.\n\nI have built workflows and skills on my personal Claude account that have meaningfully changed how I work. What I do not yet know is whether those same approaches are feasible inside the enterprise environment, or whether the connectors and configurations that make them work will be available. Getting into the pilot gives me the chance to find out and provide informed input on what would make a meaningful difference for our team.\n\nEarly access lets me test the enterprise instance in real time, so we are not figuring out what works and what does not after the setup is already locked in.` },
      { id: "whyclaude", label: "Three Risks", icon: "◍", title: "Three Risks Worth Getting Ahead Of", subtitle: "The tools are in place. The structure is not.", body: `While using ChatGPT and Gemini, we have encountered three primary risks. This is a case for getting the right setup before these risks compound.\n\nWriting inconsistency. Without shared guardrails and tested Skills.md frameworks, output quality varies by user, voice drifts across verticals, and errors in client-facing documents go unchecked.\n\nAgent sprawl. As Claude's capabilities expand, individuals will build their own workflows without a governing structure. The organization risks the same fragmentation it has today with Custom GPTs, only at a larger scale.\n\nClaude's available connectors will determine how well it works alongside the platforms the team already uses. Those decisions are easier to get right at the start than to fix after rollout.` },
      { id: "theplan", label: "The Plan", icon: "◇", title: "What Gets Built and How", subtitle: "Building the infrastructure underneath the core Claude platform", body: `The team holds biweekly AI sessions to share learnings and stay aligned on tooling. In practice those sessions rarely happen consistently because the tools we have today do not help us move to first draft fast enough to make the time feel worthwhile. That is the problem early access is positioned to solve, not through Cowork's surface features, but through the infrastructure underneath the core Claude platform.\n\nFour builds are planned for the access period.\n\nClaude skill frameworks that encode the team's proposal standards and process logic, so anyone on the team gets consistent outputs regardless of how they prompt.\n\nA feasibility analysis of moving intake from a manual process with partial automation in Zapier to a reliable end-to-end workflow in Claude, reducing fragmentation and centralizing how work enters the queue.\n\nA rebuilt proposal analysis framework to accelerate our understanding of emerging market trends, win themes, and loss patterns.\n\nAn initial exploration of building a custom proposal and content management system in house via Claude, beginning with a go/no-go analysis tool that measures fit for opportunities at intake and an RFP project planner that moves approved projects from assignment into response drafting within minutes.\n\nWithin a two-week sprint, the goal is to complete the Skills.md framework and the Zapier feasibility analysis, with findings documented and ready to share with the team.\n\nNone of these are for individual productivity. All of them are infrastructure decisions that determine how effective Cowork and Claude's core features actually become for our team.` },
      { id: "jobdesc", label: "Job Alignment", icon: "◧", title: "This Is Already Part of My Job Description", subtitle: "Restricted access creates a gap between defined responsibilities and available tools", type: "jobdesc" },
      { id: "formalask", label: "The Ask", icon: "◉", title: "An Ask With Accountability", subtitle: "A bounded, accountable ask with specific deliverables attached", type: "formalask" },
    ];

    function ExecSummary({ onNavigate }) {
      const mono = "'DM Mono', 'Courier New', monospace";
      const serif = "'Georgia', serif";
      return (
        <div style={{ display: "flex", flexDirection: "column", gap: "10px" }}>
          <p style={{ fontFamily: serif, fontSize: "13px", color: "#5a5550", lineHeight: 1.7, margin: "0 0 8px", fontStyle: "italic" }}>
            Select any section to navigate directly to it.
          </p>
          {execSummary.map((item, i) => (
            <div key={i} onClick={() => onNavigate(item.id)}
              style={{ display: "grid", gridTemplateColumns: "140px 1fr", gap: "20px", padding: "16px 18px", border: "1px solid #2a2a28", borderRadius: "4px", cursor: "pointer", transition: "border-color 0.2s ease, background 0.2s ease", background: "transparent" }}
              onMouseEnter={e => { e.currentTarget.style.borderColor = "#c9a96e40"; e.currentTarget.style.background = "#c9a96e08"; }}
              onMouseLeave={e => { e.currentTarget.style.borderColor = "#2a2a28"; e.currentTarget.style.background = "transparent"; }}
            >
              <div style={{ display: "flex", alignItems: "flex-start", gap: "10px" }}>
                <div style={{ fontFamily: mono, fontSize: "9px", color: "#4a4540", paddingTop: "3px", minWidth: "20px" }}>{String(i + 1).padStart(2, "0")}</div>
                <div style={{ fontFamily: mono, fontSize: "9px", color: "#c9a96e", letterSpacing: "0.12em", textTransform: "uppercase", lineHeight: 1.5 }}>{item.label}</div>
              </div>
              <div style={{ fontFamily: serif, fontSize: "13.5px", color: "#b8b0a4", lineHeight: 1.7 }}>{item.text}</div>
            </div>
          ))}
        </div>
      );
    }

    function JobDesc() {
      const mono = "'DM Mono', 'Courier New', monospace";
      const serif = "'Georgia', serif";
      return (
        <div style={{ display: "flex", flexDirection: "column", gap: "22px" }}>
          <p style={{ fontFamily: serif, fontSize: "15px", lineHeight: 1.85, color: "#ccc5ba", margin: 0 }}>
            Under the <strong style={{ color: "#f0ebe3" }}>Systems and Intelligence Specialization</strong> section of my role as RFP Systems and Intelligence Lead, every core responsibility points directly at AI-supported systems work. Each one requires being inside the tool, not adjacent to it.
          </p>
          <div style={{ border: "1px solid #4a674140", borderRadius: "4px", overflow: "hidden" }}>
            <div style={{ background: "#4a674118", padding: "10px 16px", borderBottom: "1px solid #4a674130" }}>
              <span style={{ fontFamily: mono, fontSize: "9px", letterSpacing: "0.18em", textTransform: "uppercase", color: "#4a6741" }}>Based on My Current Role Scope · Systems and Intelligence Specialization</span>
            </div>
            <div style={{ padding: "4px 0 8px" }}>
              {jdResponsibilities.map((r, i) => (
                <div key={i} style={{ display: "grid", gridTemplateColumns: "28px 1fr", gap: "4px", padding: "10px 16px", borderTop: i > 0 ? "1px solid #1e1e1c" : "none" }}>
                  <div style={{ fontFamily: mono, fontSize: "9px", color: "#4a6741", paddingTop: "3px", opacity: 0.7 }}>0{i + 1}</div>
                  <div style={{ fontFamily: serif, fontSize: "13px", color: "#b8b0a4", lineHeight: 1.65 }}>{r}</div>
                </div>
              ))}
            </div>
          </div>
          <p style={{ fontFamily: serif, fontSize: "14px", lineHeight: 1.8, color: "#9a9088", margin: 0, fontStyle: "italic" }}>
            Every one of those responsibilities requires direct access to Claude, with the ability to build, test, iterate, and refine inside the tool itself.
          </p>
          <div style={{ border: "1px solid #8a7fa040", borderRadius: "4px", overflow: "hidden" }}>
            <div style={{ background: "#8a7fa018", padding: "10px 16px", borderBottom: "1px solid #8a7fa030" }}>
              <span style={{ fontFamily: mono, fontSize: "9px", letterSpacing: "0.18em", textTransform: "uppercase", color: "#8a7fa0" }}>What Success Looks Like · Based on Current Role Scope</span>
            </div>
            <div style={{ padding: "4px 0 8px" }}>
              {jdSuccess.map((s, i) => (
                <div key={i} style={{ display: "grid", gridTemplateColumns: "20px 1fr", gap: "10px", padding: "10px 16px", borderTop: i > 0 ? "1px solid #1e1e1c" : "none", alignItems: "start" }}>
                  <div style={{ color: "#8a7fa0", fontSize: "12px", paddingTop: "2px" }}>✓</div>
                  <div style={{ fontFamily: serif, fontSize: "13px", color: "#b8b0a4", lineHeight: 1.65 }}>{s}</div>
                </div>
              ))}
            </div>
          </div>
          <div style={{ borderLeft: "3px solid #c9a96e", padding: "14px 18px", background: "#1a1a18", borderRadius: "0 4px 4px 0" }}>
            <p style={{ fontFamily: serif, fontSize: "13.5px", color: "#ccc5ba", lineHeight: 1.75, margin: 0 }}>
              The scope of this role and the access model are currently pointed in different directions. Expedited access removes this conflict.
            </p>
          </div>
        </div>
      );
    }

    function FormalAsk() {
      const mono = "'DM Mono', 'Courier New', monospace";
      const serif = "'Georgia', serif";
      const commits = [
        "Deliver at least two documented, team-ready Claude workflows or feasibility findings within the access period",
        "Provide structured feedback on what the enterprise instance can and cannot support relative to how the team works",
        "Document what Claude improves and where gaps remain, usable as input for the broader organizational rollout",
        "Begin building the tooling and infrastructure to support successful adoption on day one of the full rollout",
      ];
      return (
        <div style={{ display: "flex", flexDirection: "column", gap: "20px" }}>
          <p style={{ fontFamily: serif, fontSize: "15px", lineHeight: 1.85, color: "#ccc5ba" }}>
            I am requesting early access to Claude as a power user due to alignment with the responsibilities of my role. The goal is not open-ended exploration. It is to conduct specific testing on what is possible inside the enterprise instance, inform the configuration before it locks in, and begin building the tooling and infrastructure to support successful adoption on day one of the full rollout.
          </p>
          <div style={{ border: "1px solid #c9a96e40", borderRadius: "4px", padding: "22px 24px", background: "#c9a96e08" }}>
            <div style={{ fontFamily: mono, fontSize: "9px", letterSpacing: "0.18em", textTransform: "uppercase", color: "#c9a96e", marginBottom: "16px" }}>In Exchange, I Commit To</div>
            <div style={{ display: "flex", flexDirection: "column", gap: "12px" }}>
              {commits.map((c, i) => (
                <div key={i} style={{ display: "grid", gridTemplateColumns: "20px 1fr", gap: "10px", alignItems: "start" }}>
                  <div style={{ fontFamily: mono, fontSize: "10px", color: "#4a6741", paddingTop: "2px" }}>✓</div>
                  <div style={{ fontFamily: serif, fontSize: "13.5px", color: "#ccc5ba", lineHeight: 1.7 }}>{c}</div>
                </div>
              ))}
            </div>
          </div>
          <div style={{ border: "1px solid #2a2a28", borderLeft: "3px solid #c9a96e", borderRadius: "0 4px 4px 0", padding: "16px 20px", background: "#1a1a18" }}>
            <p style={{ fontFamily: serif, fontSize: "13px", color: "#7a6f62", lineHeight: 1.75, margin: 0 }}>
              What gets built and learned during this period benefits the team well beyond the pilot.
            </p>
          </div>
        </div>
      );
    }

    function ArchLayer({ layer }) {
      const [open, setOpen] = useState(false);
      return (
        <div style={{ border: `1px solid ${layer.color}30`, borderRadius: "4px", overflow: "hidden" }}>
          <div onClick={() => setOpen(o => !o)} style={{ display: "flex", alignItems: "center", gap: "16px", padding: "14px 18px", cursor: "pointer", background: open ? `${layer.color}12` : "transparent", transition: "background 0.2s ease" }}>
            <div style={{ fontFamily: "'DM Mono', 'Courier New', monospace", fontSize: "10px", color: layer.color, letterSpacing: "0.15em", minWidth: "28px" }}>L{layer.layer}</div>
            <div style={{ fontFamily: "'DM Mono', 'Courier New', monospace", fontSize: "11px", color: layer.color, letterSpacing: "0.12em", textTransform: "uppercase", flex: 1 }}>{layer.label}</div>
            <div style={{ fontFamily: "'DM Mono', 'Courier New', monospace", fontSize: "10px", color: "#3a3a38", transition: "transform 0.2s", transform: open ? "rotate(180deg)" : "rotate(0deg)" }}>▾</div>
          </div>
          {open && (
            <div style={{ borderTop: `1px solid ${layer.color}20`, padding: "4px 0 8px" }}>
              <p style={{ fontFamily: "'Georgia', serif", fontSize: "13px", color: "#7a6f62", lineHeight: 1.6, padding: "10px 18px 12px 60px", margin: 0, fontStyle: "italic" }}>{layer.description}</p>
              {layer.skills.map((skill, si) => (
                <div key={si} style={{ display: "flex", gap: "16px", padding: "8px 18px 8px 60px", borderTop: si > 0 ? "1px solid #1a1a18" : "none" }}>
                  <div style={{ width: "6px", height: "6px", borderRadius: "50%", background: layer.color, marginTop: "6px", flexShrink: 0, opacity: 0.7 }} />
                  <div>
                    <div style={{ fontFamily: "'DM Mono', 'Courier New', monospace", fontSize: "11px", color: "#ccc5ba", letterSpacing: "0.05em", marginBottom: "3px" }}>{skill.name}</div>
                    <div style={{ fontFamily: "'Georgia', serif", fontSize: "12px", color: "#5a5550", lineHeight: 1.5 }}>{skill.note}</div>
                  </div>
                </div>
              ))}
            </div>
          )}
        </div>
      );
    }

    function PowerUserCase() {
      const [active, setActive] = useState("execsummary");
      const current = sections.find(s => s.id === active);
      const idx = sections.findIndex(s => s.id === active);
      const mono = "'DM Mono', 'Courier New', monospace";
      const serif = "'Georgia', 'Times New Roman', serif";

      return (
        <div style={{ fontFamily: serif, background: "#0f0f0e", minHeight: "100vh", color: "#e8e2d9", display: "flex", flexDirection: "column" }}>
          <div style={{ borderBottom: "1px solid #2a2a28", padding: "32px 40px 24px", display: "flex", justifyContent: "space-between", alignItems: "flex-end" }}>
            <div>
              <div style={{ fontFamily: mono, fontSize: "10px", letterSpacing: "0.2em", color: "#7a6f62", textTransform: "uppercase", marginBottom: "8px" }}>Internal Briefing · Claude Early Access</div>
              <h1 style={{ fontSize: "28px", fontWeight: "400", margin: 0, lineHeight: 1.2, color: "#f0ebe3", letterSpacing: "-0.02em" }}>Claude Access: An RFP Systems Perspective</h1>
            </div>
            <div style={{ fontFamily: mono, fontSize: "10px", color: "#4a4540", letterSpacing: "0.1em" }}>{sections.length} SECTIONS</div>
          </div>

          <div style={{ display: "flex", borderBottom: "1px solid #1e1e1c", overflowX: "auto", padding: "0 40px" }}>
            {sections.map(s => (
              <button key={s.id} onClick={() => setActive(s.id)} style={{ background: "none", border: "none", borderBottom: active === s.id ? "2px solid #c9a96e" : "2px solid transparent", color: active === s.id ? "#c9a96e" : "#5a5550", fontFamily: mono, fontSize: "10px", letterSpacing: "0.15em", textTransform: "uppercase", padding: "14px 20px 12px", cursor: "pointer", whiteSpace: "nowrap", transition: "all 0.2s ease" }}>
                {s.icon} {s.label}
              </button>
            ))}
          </div>

          <div style={{ flex: 1, padding: "48px 40px", maxWidth: "780px" }}>
            <div style={{ fontFamily: mono, fontSize: "10px", letterSpacing: "0.2em", color: "#c9a96e", textTransform: "uppercase", marginBottom: "16px" }}>
              {String(idx + 1).padStart(2, "0")} / {String(sections.length).padStart(2, "0")}
            </div>
            <h2 style={{ fontSize: "34px", fontWeight: "400", margin: "0 0 12px", lineHeight: 1.15, color: "#f5f0e8", letterSpacing: "-0.025em" }}>{current.title}</h2>
            <p style={{ fontFamily: mono, fontSize: "11px", color: "#7a6f62", letterSpacing: "0.08em", marginBottom: "36px", lineHeight: 1.6 }}>{current.subtitle}</p>
            <div style={{ width: "48px", height: "1px", background: "#c9a96e", marginBottom: "36px", opacity: 0.6 }} />

            {current.type === "execsummary" ? (
              <ExecSummary onNavigate={setActive} />
            ) : current.type === "jobdesc" ? (
              <JobDesc />
            ) : current.type === "formalask" ? (
              <FormalAsk />
            ) : current.id === "theplan" ? (
              (() => {
                const paras = current.body.split("\n\n");
                return paras.map((para, i) => {
                  const isBuild = i >= 2 && i <= 5;
                  return isBuild ? (
                    <div key={i} style={{ display: "grid", gridTemplateColumns: "20px 1fr", gap: "12px", marginBottom: "16px", alignItems: "start" }}>
                      <div style={{ width: "6px", height: "6px", borderRadius: "50%", background: "#c9a96e", marginTop: "9px", flexShrink: 0 }} />
                      <p style={{ fontSize: "15px", lineHeight: 1.8, color: "#ccc5ba", margin: 0 }}>{para}</p>
                    </div>
                  ) : (
                    <p key={i} style={{ fontSize: "16px", lineHeight: 1.85, color: "#ccc5ba", marginBottom: "24px", letterSpacing: "0.005em" }}>{para}</p>
                  );
                });
              })()
            ) : (
              current.body.split("\n\n").map((para, i) => (
                <p key={i} style={{ fontSize: "16px", lineHeight: 1.85, color: "#ccc5ba", marginBottom: "24px", letterSpacing: "0.005em" }}>{para}</p>
              ))
            )}
          </div>

          <div style={{ borderTop: "1px solid #1e1e1c", padding: "20px 40px", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
            <button onClick={() => { if (idx > 0) setActive(sections[idx - 1].id); }} disabled={idx === 0} style={{ background: "none", border: "1px solid #2a2a28", color: idx === 0 ? "#2a2a28" : "#7a6f62", fontFamily: mono, fontSize: "10px", letterSpacing: "0.15em", padding: "8px 16px", cursor: idx === 0 ? "default" : "pointer", textTransform: "uppercase" }}>Prev</button>
            <div style={{ display: "flex", gap: "8px" }}>
              {sections.map(s => (
                <div key={s.id} onClick={() => setActive(s.id)} style={{ width: active === s.id ? "24px" : "6px", height: "6px", borderRadius: "3px", background: active === s.id ? "#c9a96e" : "#2a2a28", cursor: "pointer", transition: "all 0.3s ease" }} />
              ))}
            </div>
            <button onClick={() => { if (idx < sections.length - 1) setActive(sections[idx + 1].id); }} disabled={idx === sections.length - 1} style={{ background: "none", border: "1px solid #2a2a28", color: idx === sections.length - 1 ? "#2a2a28" : "#c9a96e", fontFamily: mono, fontSize: "10px", letterSpacing: "0.15em", padding: "8px 16px", cursor: idx === sections.length - 1 ? "default" : "pointer", textTransform: "uppercase" }}>Next</button>
          </div>

          <div style={{ borderTop: "1px solid #1a1a18", padding: "14px 40px" }}>
            <p style={{ fontFamily: mono, fontSize: "9px", color: "#3a3a38", letterSpacing: "0.08em", lineHeight: 1.7, margin: 0, textAlign: "center" }}>
              This document was drafted with the assistance of Claude by Anthropic. All content reflects the author's own analysis and perspective. No company systems, data, or confidential information was referenced in its creation.
            </p>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<PowerUserCase />);
  </script>
</body>
</html>
